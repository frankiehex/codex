openapi: 3.0.3
info:
  title: AI Car Wash Auth API
  version: 0.1.0
  description: |
    Phone-number onboarding and session management API using SMS-based one-time passwords.
servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging-api.example.com
    description: Staging
paths:
  /auth/otp/request:
    post:
      summary: Request an OTP for phone number verification
      operationId: requestOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
              properties:
                phoneNumber:
                  type: string
                  example: "+886912345678"
                channel:
                  type: string
                  enum: [sms]
                  default: sms
                locale:
                  type: string
                  example: zh-TW
      responses:
        '202':
          description: OTP accepted for delivery
          content:
            application/json:
              schema:
                type: object
                properties:
                  challengeId:
                    type: string
                  expiresInSeconds:
                    type: integer
                  resendAvailableAt:
                    type: string
                    format: date-time
                  attemptsRemaining:
                    type: integer
        '429':
          description: Rate limit exceeded or cooldown in effect
  /auth/otp/resend:
    post:
      summary: Resend an OTP within throttle limits
      operationId: resendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challengeId
              properties:
                challengeId:
                  type: string
                deliveryHint:
                  type: string
                  enum: [sms, voice]
                  default: sms
      responses:
        '202':
          description: OTP resend accepted
        '404':
          description: Challenge not found or expired
        '429':
          description: Resend throttle exceeded
  /auth/otp/verify:
    post:
      summary: Verify the OTP code
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challengeId
                - otpCode
              properties:
                challengeId:
                  type: string
                otpCode:
                  type: string
                  minLength: 6
                  maxLength: 6
                deviceId:
                  type: string
                  description: Unique identifier for the mobile device
                referralCode:
                  type: string
      responses:
        '200':
          description: OTP verified; session tokens returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  tokenType:
                    type: string
                    example: Bearer
                  expiresIn:
                    type: integer
                  newUser:
                    type: boolean
                  profile:
                    $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid OTP or challenge state
        '401':
          description: OTP verification failed
        '409':
          description: Phone number already linked to another active account
  /auth/logout:
    post:
      summary: Revoke the active session and refresh token
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deviceId
              properties:
                deviceId:
                  type: string
      responses:
        '204':
          description: Session revoked successfully
        '401':
          description: Invalid or expired access token
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: string
        phoneNumber:
          type: string
        locale:
          type: string
        vehicles:
          type: array
          items:
            type: object
            properties:
              plateNumber:
                type: string
              nickname:
                type: string
        loyaltyPoints:
          type: integer
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
